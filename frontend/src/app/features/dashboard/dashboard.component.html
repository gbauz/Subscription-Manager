<div class="dashboard">
  <!-- Seccion de resumen -->
  <section class="dashboard__summary">
    <app-monthly-summary [stats]="stats()" />
    <app-upcoming-renewals [subscriptions]="subscriptions()" />
  </section>

  <!-- Portafolio de suscripciones -->
  <section class="dashboard__portfolio">
    <div class="portfolio-header">
      <div>
        <h2 class="headline-sm">Tu Portafolio Digital</h2>
        <p class="body-md">Suscripciones activas gestionadas</p>
      </div>
      <div class="portfolio-filters">
        <button class="filter-chip active">Categoria</button>
        <button class="filter-chip">Precio</button>
      </div>
    </div>

    @if (isLoading()) {
      <div class="loading-state">
        <span class="material-icons-outlined loading-spinner">sync</span>
        <p class="body-md">Cargando suscripciones...</p>
      </div>
    } @else {
      <div class="subscription-grid">
        @for (sub of activeSubscriptions(); track sub.id) {
          <app-subscription-card
            [subscription]="sub"
            (onEdit)="handleEdit($event)"
            (onDelete)="handleDelete($event)"
            (onToggleStatus)="handleToggleStatus($event)"
          />
        } @empty {
          <app-empty-state
            icon="inbox"
            title="No hay suscripciones activas"
            description="Agrega tu primera suscripción para comenzar."
          />
        }
      </div>

      <div class="add-section">
        <div class="add-card" (click)="navigateToAdd()">
          <span class="material-icons-outlined">add</span>
          <p class="body-md">Agregar Suscripcion</p>
          <p class="label-md" style="text-transform: none;">Gestiona un nuevo servicio digitalmente</p>
        </div>
      </div>
    }
  </section>
</div>
<!-- Agregar al final de dashboard.component.html -->
<app-confirm-dialog
  [visible]="showConfirm"
  [loading]="deleting"
  [message]="'Se eliminará ' + (pendingDelete?.name ?? 'este elemento') + ' de forma permanente.'"
  (confirmed)="onDeleteConfirmed()"
  (cancelled)="onDeleteCancelled()"
/>
